<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles</title>

    <style>

        /* ---------- Dark mode brute override ---------- */
body.dark {
    background-color: #0f0f0f;
}

body.dark * {
    color: #e6e6e6 !important;
}

body.dark a {
    color: #e6a565 !important;
}

body.dark #nav {
    background-color: #111;
}

body.dark img {
    filter: brightness(0.9) contrast(1.05);
}

        :root {
    --bg-color: #ffffff;
    --text-color: #2b2b2b;
    --muted-text: rgb(88, 88, 88);
    --accent: rgb(230, 165, 101);
    --link-color: rgb(220, 145, 84);
    --dash-color: rgb(83, 83, 83);
    }

    body.dark {
        --bg-color: #121212;
        --text-color: #e6e6e6;
        --muted-text: #b5b5b5;
        --accent: #c48a55;
        --link-color: #d6a26a;
        --dash-color: #9a9a9a;
    }

        body {
            min-height: 100vh;
            width: 100%;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0 1.2rem;
            box-sizing: border-box;
        }


        #poems {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            text-align: center;
        }

        h2 {
            margin-top: 4rem;
            font-size: 2rem;
        }

        #dash {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            color: rgb(83, 83, 83);
            flex-wrap: wrap;
            justify-content: center;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 2rem 0 0;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            width: 100%;
            max-width: 600px;
        }

        ul a {
            text-decoration: underline;
            font-weight: bold;
            color: rgb(220, 145, 84);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* ---------- Mobile tweaks ---------- */
        @media (max-width: 600px) {
            h2 {
                font-size: 1.7rem;
                margin-top: 3rem;
            }

            ul a {
                font-size: 1rem;
            }

            #dash span {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
    <div id="poems">
        <h2>articles</h2>

        <div id="dash">
            <span style="font-size: x-large; font-weight: bold;">|</span>
            <span><em>remnants of endless brainstorming</em></span>
        </div>

        <ul>
            <a href="article1.html">You are somebody’s something, but you are also your you</a>
            <a href="article2.html">Making peace with the gray areas of life</a>
            <a href="article3.html">The GPT craze and my inexplainable aversion to it</a>
            <a href="article4.html">The Clock & I</a>
            <a href="article5.html">Dear 'insert name'</a>
            <a href="article6.html">Lava of Hate</a>
        </ul>
    </div>
    <script>
    const toggle = document.getElementById("themeToggle");
    const body = document.body;

    // Load saved theme
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
        body.classList.add("dark");
        if (toggle) toggle.textContent = "☾";
    }

    if (toggle) {
        toggle.addEventListener("click", () => {
            body.classList.toggle("dark");

            const isDark = body.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            toggle.textContent = isDark ? "☾" : "☼";
        });
    }
    </script>

</body>
</html>
