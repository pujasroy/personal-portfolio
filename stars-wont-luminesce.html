<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The stars won't luminesce forever</title>

    <style>
        /* ---------- Dark mode brute override ---------- */
body.dark {
    background-color: #0f0f0f;
}

body.dark * {
    color: #e6e6e6 !important;
}

body.dark a {
    color: #e6a565 !important;
}

body.dark #nav {
    background-color: #111;
}

body.dark img {
    filter: brightness(0.9) contrast(1.05);
}

            :root {
        --bg-color: #ffffff;
        --text-color: #2b2b2b;
        --muted-text: rgb(88, 88, 88);
        --accent: rgb(230, 165, 101);
        --link-color: rgb(220, 145, 84);
        --dash-color: rgb(83, 83, 83);
        }

        body.dark {
            --bg-color: #121212;
            --text-color: #e6e6e6;
            --muted-text: #b5b5b5;
            --accent: #c48a55;
            --link-color: #d6a26a;
            --dash-color: #9a9a9a;
        }
        body {
            height: 100vh;
            width: 100vw;
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
        }

        #poem {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        h2 {
            margin-top: 4rem;
            margin-bottom: 1rem;
            font-size: 2rem;
            text-align: center;
        }

        #dash {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .poem-content {
            line-height: 2;
            text-align: center;
            font-size: 1.3rem;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.15);
        }

        .poem-content p {
            margin: 0.8rem 0;
        }

        .back-link {
            margin-top: 3rem;
            color: rgb(230, 165, 101);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="poem">
        <h2>The stars won't luminesce forever</h2>

        <div id="dash">
            <span>|</span>
            <span><em>poetry</em></span>
        </div>

        <div class="poem-content">
            <p>The stars won't luminesce forever</p>
            <p>They'll successively wither</p>
            <p>And make their vestiges slumber.</p>

            <br>

            <p>Humans, too, shall rather perish</p>
            <p>Than linger in here for too long</p>
            <p>With the universe laying them to rest.</p>
        </div>

        <a href="poetry.html" class="back-link">← Back to Poetry</a>
    </div>
    <script>
    const toggle = document.getElementById("themeToggle");
    const body = document.body;

    // Load saved theme
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
        body.classList.add("dark");
        if (toggle) toggle.textContent = "☾";
    }

    if (toggle) {
        toggle.addEventListener("click", () => {
            body.classList.toggle("dark");

            const isDark = body.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            toggle.textContent = isDark ? "☾" : "☼";
        });
    }
    </script>
</body>
</html>
